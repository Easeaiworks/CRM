services:
  - type: web
    name: refinish-ai-crm
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/Easeaiworks/REFINISH-AI-CRM.git
    branch: main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
